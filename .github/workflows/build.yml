name: Build & Release

on:
  push:
    branches: [ master ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create tags and releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore UltraFocusMode.csproj

      - name: Publish (self-contained single file)
        run: >
          dotnet publish UltraFocusMode.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish

      - name: Zip
        run: Compress-Archive -Path ./publish/UltraFocusMode.exe -DestinationPath UltraFocusMode-v${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## UltraFocusMode v${{ steps.version.outputs.VERSION }}

            Built from commit ${{ github.sha }}

            ### Install
            Download `UltraFocusMode-v${{ steps.version.outputs.VERSION }}.zip`, extract and run `UltraFocusMode.exe`.
            No .NET installation required.
          files: UltraFocusMode-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
