name: Build & Package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore UltraFocusMode.csproj

      - name: Publish (self-contained, single file)
        run: >
          dotnet publish UltraFocusMode.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o ./publish

      - name: Zip artifact
        run: Compress-Archive -Path ./publish/UltraFocusMode.exe -DestinationPath UltraFocusMode.zip

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: UltraFocusMode-${{ github.sha }}
          path: UltraFocusMode.zip
          retention-days: 30
